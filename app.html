<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure App - Mobile View</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="mobile-app">
    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-box">
            <input type="password" id="password-input" placeholder="Password" autofocus>
            <button id="login-btn">Login</button>
            <div id="error-msg" class="error-msg"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="loading-text" id="loading-text">
            <span>Ᏸ</span><span>Ꭷ</span><span>Ꮑ</span><span>Ꮶ</span><span>Ꭷ</span>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <header>
            <nav>
                <h1>ᏰᎧᏁᏦᎧ</h1>
            </nav>
        </header>
        
        <main>
            <section class="hero">
                <h2>Welcome back!</h2>
                <p>Everything you love, kept safe and sound.</p>
                <button class="cta-btn">View Memories</button>
            </section>
            
            <section class="features">
                <div class="card">
                    <h3>Secure Messages</h3>
                    <p>Encryption for every word.</p>
                </div>
                <div class="card">
                    <h3>Private Gallery</h3>
                    <p>Hidden with "BonKo" protection.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
