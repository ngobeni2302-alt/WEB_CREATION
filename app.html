<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure App - Mobile View</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body class="mobile-app">
    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-box">
            <input type="password" id="password-input" placeholder="Password" autofocus>
            <button id="login-btn">Login</button>
            <div id="error-msg" class="error-msg"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="loading-text" id="loading-text">
            <span>Ᏸ</span><span>Ꭷ</span><span>Ꮑ</span><span>Ꮶ</span><span>Ꭷ</span>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <header>
            <nav>
                <h1>ᏰᎧᏁᏦᎧ</h1>
            </nav>
        </header>
        
        <main>
            <section class="hero">
                <h2>Hey, Murhandziwa ❤️</h2>
                <p>From my heart to yours...<br>Everything you love, kept safe and sound.</p>
            </section>
            
            <section class="features">
                <button id="view-memories-btn" class="card card-button" type="button">
                    <h3>ᏙᎥᎬᎳ ᎷᎬᎷᎧᎡᎥᎬᎦ</h3>
                    <p>A Journey Of Our Love Story</p>
                </button>
                <div class="card">
                    <h3>ᎧᎤᎡ ᎢᎥᎷᎬ ᎢᎧᎶᎬᎢᏂᎬᎡ</h3>
                    <p>Guilty For Loving You</p>
                </div>
            </section>

            <section id="memories-panel" class="memories-panel hidden" aria-hidden="true">
                <div class="memories-header">
                    <div>
                        <p class="memories-kicker">View Memories</p>
                        <h2>Our Photo Vault</h2>
                    </div>
                    <button id="close-memories-btn" class="memories-close" type="button" aria-label="Close memories">
                        Close
                    </button>
                </div>
                <p class="memories-copy">A private collection of five random memories waiting for you.</p>
                <div id="memories-grid" class="memories-grid"></div>
            </section>
            
            <section class="love-quotes">
                <h2 class="cherokee-title">Ꭵ ᏞᎧᏙᎬ ᎩᎧᎤ</h2>
                <div class="quote-container">
                    <button id="quote-btn" class="cta-btn">Click Me ❤️</button>
                    <div id="quote-display" class="quote-card hidden">
                        <p id="quote-text"></p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
