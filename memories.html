<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Memories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body class="gallery-page">
    <main class="gallery-shell">
        <a class="gallery-back" href="app.html">Back</a>
        <section class="gallery-hero">
            <p class="gallery-kicker">View Memories</p>
            <h1>Our Photo Vault</h1>
            <p>
                Memories To Keep You Smiling, For Your Beauty Is Worth Capturing
                <img class="gallery-inline-photo" src="https://picsum.photos/seed/smiling-memory/72/72" alt="A small smiling memory photo" loading="lazy" referrerpolicy="no-referrer">
            </p>
        </section>
        <section class="gallery-grid" aria-label="Memory photos">
            <article class="gallery-card">
                <img class="gallery-image" src="https://picsum.photos/seed/memory-one/900/1200" alt="Memory photo 1" loading="eager" referrerpolicy="no-referrer">
            </article>
            <article class="gallery-card">
                <img class="gallery-image" src="https://picsum.photos/seed/memory-two/900/1200" alt="Memory photo 2" loading="lazy" referrerpolicy="no-referrer">
            </article>
            <article class="gallery-card">
                <img class="gallery-image" src="https://picsum.photos/seed/memory-three/900/1200" alt="Memory photo 3" loading="lazy" referrerpolicy="no-referrer">
            </article>
            <article class="gallery-card">
                <img class="gallery-image" src="https://picsum.photos/seed/memory-four/900/1200" alt="Memory photo 4" loading="lazy" referrerpolicy="no-referrer">
            </article>
            <article class="gallery-card">
                <img class="gallery-image" src="https://picsum.photos/seed/memory-five/900/1200" alt="Memory photo 5" loading="lazy" referrerpolicy="no-referrer">
            </article>
        </section>
    </main>
</body>
</html>
